<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ELISYAN</title>

<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    background: linear-gradient(to bottom, #fff0f5, #ffffff);
    overflow-x: hidden;
}

/* 🌸 Falling petals */
.petal {
    position: fixed;
    top: -10px;
    width: 10px;
    height: 10px;
    background: pink;
    border-radius: 50%;
    opacity: 0.7;
    animation: fall linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(110vh);
    }
}

/* 🌿 Logo section */
#intro {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

.logo {
    font-size: 50px;
    letter-spacing: 8px;
    color: #d63384;
    animation: fadeIn 2s ease forwards;
}

/* 🌿 branches */
.branch {
    position: absolute;
    width: 120px;
    opacity: 0;
    animation: appear 2s forwards;
}

.top-left { top: 0; left: 0; }
.top-right { top: 0; right: 0; }
.bottom-left { bottom: 0; left: 0; }
.bottom-right { bottom: 0; right: 0; }

@keyframes appear {
    to { opacity: 1; }
}

/* 🎥 Reel style sections */
.section {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.card {
    background: white;
    border-radius: 30px;
    padding: 30px;
    width: 80%;
    display: flex;
    gap: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.card img {
    width: 150px;
    border-radius: 20px;
}

.card h2 {
    color: #d63384;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}
</style>
</head>

<body>

<!-- 🌸 petals -->
<script>
for(let i=0;i<20;i++){
    let petal = document.createElement("div");
    petal.className="petal";
    petal.style.left=Math.random()*100+"vw";
    petal.style.animationDuration=(3+Math.random()*5)+"s";
    document.body.appendChild(petal);
}
</script>

<!-- 🌿 intro -->
<section id="intro">
    <img src="https://i.imgur.com/6X4Z5Qp.png" class="branch top-left">
    <img src="https://i.imgur.com/6X4Z5Qp.png" class="branch top-right">
    <img src="https://i.imgur.com/6X4Z5Qp.png" class="branch bottom-left">
    <img src="https://i.imgur.com/6X4Z5Qp.png" class="branch bottom-right">

    <div class="logo">ELISYAN</div>
</section>

<!-- 👗 Sections -->
<section class="section">
    <div class="card">
        <img src="https://via.placeholder.com/150">
        <div>
            <h2>Kurtis</h2>
            <p>Elegant and timeless silhouettes crafted in soft hues.</p>
        </div>
    </div>
</section>

<section class="section">
    <div class="card">
        <img src="https://via.placeholder.com/150">
        <div>
            <h2>Tops</h2>
            <p>Minimal yet powerful everyday luxury styles.</p>
        </div>
    </div>
</section>

<section class="section">
    <div class="card">
        <img src="https://via.placeholder.com/150">
        <div>
            <h2>Gowns</h2>
            <p>Flowing designs that feel like poetry in motion.</p>
        </div>
    </div>
</section>

<section class="section">
    <div class="card">
        <img src="https://via.placeholder.com/150">
        <div>
            <h2>Denim</h2>
            <p>Structured elegance meets modern edge.</p>
        </div>
    </div>
</section>

</body>
</html>
